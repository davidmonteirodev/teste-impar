services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-local
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "SuaSenha@123"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SuaSenha@123' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./vehiclecrm-backend/VehicleCRM
      dockerfile: Dockerfile
    container_name: vehiclecrm-backend
    restart: unless-stopped
    
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__VehicleCrmConnection=Server=sqlserver,1433;Database=VehicleCRM;User Id=sa;Password=SuaSenha@123;TrustServerCertificate=True;Encrypt=False;

    ports:
      - "5000:8080"

    depends_on:
      sqlserver:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./vehiclecrm-frontend/vehiclecrm
      dockerfile: Dockerfile
    container_name: vehiclecrm-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    environment:
      - REACT_APP_API_URL=http://localhost:5000

volumes:
  sqlserver_data:
